name: Test Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build project
        run: |
          flutter create temp_app --project-name anime_mt --org com.animemt
          sed -i 's/com.example.anime_mt/com.animemt.anime_mt/' temp_app/android/app/build.gradle
          mkdir -p temp_app/lib/screens
          mkdir -p temp_app/lib/services
          mkdir -p temp_app/lib/widgets
          cp lib/main.dart temp_app/lib/main.dart
          cp lib/screens/splash_screen.dart temp_app/lib/screens/splash_screen.dart
          cp lib/screens/main_screen.dart temp_app/lib/screens/main_screen.dart
          cp lib/screens/latest_screen.dart temp_app/lib/screens/latest_screen.dart
          cp lib/screens/anime_list_screen.dart temp_app/lib/screens/anime_list_screen.dart
          cp lib/screens/library_screen.dart temp_app/lib/screens/library_screen.dart
          cp lib/screens/history_screen.dart temp_app/lib/screens/history_screen.dart
          cp lib/screens/downloads_screen.dart temp_app/lib/screens/downloads_screen.dart
          cp lib/screens/settings_screen.dart temp_app/lib/screens/settings_screen.dart
          cp lib/screens/detail_screen.dart temp_app/lib/screens/detail_screen.dart
          cp lib/screens/player_screen.dart temp_app/lib/screens/player_screen.dart
          cp lib/screens/search_screen.dart temp_app/lib/screens/search_screen.dart
          cp lib/services/api_service.dart temp_app/lib/services/api_service.dart
          cp lib/widgets/shimmer_widget.dart temp_app/lib/widgets/shimmer_widget.dart
          cp pubspec.yaml temp_app/pubspec.yaml
          cp icon.png temp_app/icon.png
          sed -i 's/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">\n    <uses-permission android:name="android.permission.INTERNET"\/>/' temp_app/android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="anime_mt"/android:label="Anime MT"/' temp_app/android/app/src/main/AndroidManifest.xml
          cd temp_app
          flutter pub get
          dart run flutter_launcher_icons
          flutter build apk --debug
          mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/AnimeMT-test.apk

      - name: Upload Test APK
        uses: actions/upload-artifact@v4
        with:
          name: AnimeMT-test
          path: temp_app/build/app/outputs/flutter-apk/AnimeMT-test.apk
          retention-days: 7