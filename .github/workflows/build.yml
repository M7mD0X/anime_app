name: Build APK

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: Install Android SDK 36
        run: |
          echo "y" | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Bump version
        id: version
        run: |
          CURRENT=$(cat version.txt)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          if [ "${{ github.event.inputs.bump_type }}" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "${{ github.event.inputs.bump_type }}" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo $NEW_VERSION > version.txt
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Save new version to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add version.txt
          git commit -m "chore: bump version to ${{ env.VERSION }}"
          git pull --rebase origin main
          git push

      - name: Build project
        run: |
          flutter create temp_app --project-name anime_mt --org com.animemt

          # Fix applicationId
          sed -i 's/com.example.anime_mt/com.animemt.anime_mt/' temp_app/android/app/build.gradle

          # Set version
          sed -i "s/versionCode 1/versionCode ${{ env.VERSION_CODE }}/" temp_app/android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"${{ env.VERSION }}\"/" temp_app/android/app/build.gradle

          # Fix Kotlin version for media_kit
          sed -i "s/ext.kotlin_version = '1.8.0'/ext.kotlin_version = '1.9.22'/" temp_app/android/build.gradle
          sed -i "s/classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:.*'/classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22'/" temp_app/android/build.gradle

          # Enable Multidex
          sed -i '/minSdkVersion/a\        multiDexEnabled true' temp_app/android/app/build.gradle
          sed -i "/implementation 'org.jetbrains.kotlin/a\    implementation 'androidx.multidex:multidex:2.0.1'" temp_app/android/app/build.gradle

          # Fix AndroidManifest
          sed -i 's/android:name="${applicationName}"/android:name="androidx.multidex.MultiDexApplication"/' temp_app/android/app/src/main/AndroidManifest.xml
          sed -i 's/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">\n    <uses-permission android:name="android.permission.INTERNET"\/>/' temp_app/android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="anime_mt"/android:label="Anime MT"/' temp_app/android/app/src/main/AndroidManifest.xml

          # Copy source files
          mkdir -p temp_app/lib/screens
          mkdir -p temp_app/lib/services
          mkdir -p temp_app/lib/widgets
          cp lib/main.dart temp_app/lib/main.dart
          cp lib/screens/splash_screen.dart temp_app/lib/screens/splash_screen.dart
          cp lib/screens/main_screen.dart temp_app/lib/screens/main_screen.dart
          cp lib/screens/latest_screen.dart temp_app/lib/screens/latest_screen.dart
          cp lib/screens/anime_list_screen.dart temp_app/lib/screens/anime_list_screen.dart
          cp lib/screens/library_screen.dart temp_app/lib/screens/library_screen.dart
          cp lib/screens/history_screen.dart temp_app/lib/screens/history_screen.dart
          cp lib/screens/downloads_screen.dart temp_app/lib/screens/downloads_screen.dart
          cp lib/screens/settings_screen.dart temp_app/lib/screens/settings_screen.dart
          cp lib/screens/detail_screen.dart temp_app/lib/screens/detail_screen.dart
          cp lib/screens/player_screen.dart temp_app/lib/screens/player_screen.dart
          cp lib/screens/search_screen.dart temp_app/lib/screens/search_screen.dart
          cp lib/services/api_service.dart temp_app/lib/services/api_service.dart
          cp lib/widgets/shimmer_widget.dart temp_app/lib/widgets/shimmer_widget.dart
          cp pubspec.yaml temp_app/pubspec.yaml
          cp icon.png temp_app/icon.png

          cd temp_app
          flutter pub get
          dart run flutter_launcher_icons
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/AnimeMT.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: "Anime MT v${{ env.VERSION }}"
          body: "Version ${{ env.VERSION }}"
          files: temp_app/build/app/outputs/flutter-apk/AnimeMT.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}