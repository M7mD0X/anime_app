name: Build APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Set version
        run: |
          BUILD=${{ github.run_number }}
          echo "VERSION=1.0.$BUILD" >> $GITHUB_ENV

      - name: Create Flutter project
        run: flutter create temp_app

      - name: Copy our files
        run: |
          mkdir -p temp_app/lib/screens
          cp lib/main.dart temp_app/lib/main.dart
          cp lib/screens/home_screen.dart temp_app/lib/screens/home_screen.dart
          cp pubspec.yaml temp_app/pubspec.yaml
          sed -i "s/version: 1.0.0+1/version: ${{ env.VERSION }}+${{ github.run_number }}/" temp_app/pubspec.yaml

      - name: Build APK
        working-directory: temp_app
        run: |
          flutter pub get
          flutter build apk --release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: "إصدار ${{ env.VERSION }}"
          body: "تحديث تلقائي - إصدار ${{ env.VERSION }}"
          files: temp_app/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}