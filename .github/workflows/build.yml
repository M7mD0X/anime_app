name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Create Flutter project
        run: flutter create temp_app

      - name: Copy our files
        run: |
          mkdir -p temp_app/lib/screens
          cp lib/main.dart temp_app/lib/main.dart
          cp lib/screens/home_screen.dart temp_app/lib/screens/home_screen.dart
          cp pubspec.yaml temp_app/pubspec.yaml

      - name: Build APK
        working-directory: temp_app
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anime-app
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk