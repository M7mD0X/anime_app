name: Build APK

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: 'Release notes (leave empty to auto-generate from commits)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # needed for git log changelog

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Bump version
        id: version
        run: |
          CURRENT=$(cat version.txt)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          if [ "${{ github.event.inputs.bump_type }}" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "${{ github.event.inputs.bump_type }}" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo $NEW_VERSION > version.txt
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Generate changelog
        run: |
          MANUAL_NOTES="${{ github.event.inputs.release_notes }}"
          
          # Auto-generate from commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            AUTO_LOG=$(git log --oneline -10 --pretty=format:"- %s" | grep -v "^- chore:" || true)
          else
            AUTO_LOG=$(git log ${LAST_TAG}..HEAD --oneline --pretty=format:"- %s" | grep -v "^- chore:" || true)
          fi
          
          # Combine manual + auto
          if [ -n "$MANUAL_NOTES" ] && [ -n "$AUTO_LOG" ]; then
            CHANGELOG="$MANUAL_NOTES

          **Changes:**
          $AUTO_LOG"
          elif [ -n "$MANUAL_NOTES" ]; then
            CHANGELOG="$MANUAL_NOTES"
          elif [ -n "$AUTO_LOG" ]; then
            CHANGELOG="**Changes:**
          $AUTO_LOG"
          else
            CHANGELOG="Version ${{ env.VERSION }}"
          fi
          
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build project
        run: |
          flutter create temp_app --project-name anime_mt --org com.animemt

          # Write build.gradle directly (no sed guessing)
          cat > temp_app/android/app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
              id 'dev.flutter.flutter-gradle-plugin'
          }

          android {
              compileSdkVersion 36
              ndkVersion flutter.ndkVersion

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }

              defaultConfig {
                  applicationId "com.animemt.anime_mt"
                  minSdkVersion 21
                  targetSdkVersion 36
                  versionCode VERSION_CODE_PLACEHOLDER
                  versionName "VERSION_NAME_PLACEHOLDER"
                  multiDexEnabled true
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source '../..'
          }

          dependencies {
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'
              implementation 'androidx.multidex:multidex:2.0.1'
          }
          GRADLE

          # Inject version values
          sed -i "s/VERSION_CODE_PLACEHOLDER/${{ env.VERSION_CODE }}/" temp_app/android/app/build.gradle
          sed -i "s/VERSION_NAME_PLACEHOLDER/${{ env.VERSION }}/" temp_app/android/app/build.gradle

          # Fix root build.gradle kotlin version
          sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.22'/" temp_app/android/build.gradle

          # Write AndroidManifest
          cat > temp_app/android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:label="Anime MT"
                  android:name="androidx.multidex.MultiDexApplication"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
              </application>
          </manifest>
          MANIFEST

          # Copy source files
          mkdir -p temp_app/lib/screens
          mkdir -p temp_app/lib/services
          mkdir -p temp_app/lib/widgets
          cp lib/main.dart temp_app/lib/main.dart
          cp lib/screens/splash_screen.dart temp_app/lib/screens/splash_screen.dart
          cp lib/screens/main_screen.dart temp_app/lib/screens/main_screen.dart
          cp lib/screens/latest_screen.dart temp_app/lib/screens/latest_screen.dart
          cp lib/screens/anime_list_screen.dart temp_app/lib/screens/anime_list_screen.dart
          cp lib/screens/library_screen.dart temp_app/lib/screens/library_screen.dart
          cp lib/screens/history_screen.dart temp_app/lib/screens/history_screen.dart
          cp lib/screens/downloads_screen.dart temp_app/lib/screens/downloads_screen.dart
          cp lib/screens/settings_screen.dart temp_app/lib/screens/settings_screen.dart
          cp lib/screens/detail_screen.dart temp_app/lib/screens/detail_screen.dart
          cp lib/screens/player_screen.dart temp_app/lib/screens/player_screen.dart
          cp lib/screens/search_screen.dart temp_app/lib/screens/search_screen.dart
          cp lib/services/api_service.dart temp_app/lib/services/api_service.dart
          cp lib/widgets/shimmer_widget.dart temp_app/lib/widgets/shimmer_widget.dart
          cp pubspec.yaml temp_app/pubspec.yaml
          cp icon.png temp_app/icon.png

          cd temp_app
          flutter pub get
          dart run flutter_launcher_icons
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/AnimeMT.apk

      - name: Save version to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add version.txt
          git commit -m "chore: bump version to ${{ env.VERSION }}"
          git pull --rebase origin main
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: "Anime MT v${{ env.VERSION }}"
          body: ${{ env.CHANGELOG }}
          files: temp_app/build/app/outputs/flutter-apk/AnimeMT.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}